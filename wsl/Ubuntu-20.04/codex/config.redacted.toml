[mcp_servers.figma]
enabled = true
url = "https://mcp.figma.com/mcp"

[mcp_servers.figma.http_headers]
X-Figma-Region = "us-east-1"

[notify_policy]
# Agent 执行约束：单次思考/处理超过该秒数必须主动调用 notify.py 发送飞书通知。
long_running_seconds = 180
# Agent 执行约束：每次请求权限、请求用户确认处理方式、或因阻塞需要用户输入前必须主动发送飞书通知。
notify_on_permission_or_confirmation = true
# Agent 执行约束：每次完成最终回答后依赖 Codex 顶层 notify hook；若 hook 不可用，需手动调用 notify.py。
notify_on_final_response = true

[tui]
status_line = "<redacted>"
status_line_use_colors = true
session_picker_view = "dense"
notifications = true

[tui.model_availability_nux]
"gpt-5.5" = 4

[notice]
fast_default_opt_out = true

[notice.model_migrations]
"gpt-5.3-codex" = "gpt-5.4"

